name: Release native binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: adf_windows_amd64.exe
          - goos: windows
            goarch: arm64
            output: adf_windows_arm64.exe
          - goos: linux
            goarch: amd64
            output: adf_linux_amd64
          - goos: linux
            goarch: arm64
            output: adf_linux_arm64
          - goos: darwin
            goarch: amd64
            output: adf_darwin_amd64
          - goos: darwin
            goarch: arm64
            output: adf_darwin_arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build
          -trimpath
          -ldflags "-s -w -X github.com/julianorubioco-cyber/ai-development-framework/internal/adf.Version=${GITHUB_REF_NAME}"
          -o dist/${{ matrix.output }}
          ./cmd/adf
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --generate-notes
          --title "$GITHUB_REF_NAME"
